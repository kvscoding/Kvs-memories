<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
  <title>kuch shabd · dosti ke naam</title>
  <!-- Firebase modular SDK for Realtime Database -->
  <script type="module">
    // Import Firebase Realtime Database
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getDatabase, ref, push, query, orderByChild, onValue, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

    // 🔴 REPLACE THIS WITH YOUR FIREBASE CONFIG 🔴
const firebaseConfig = {
  apiKey: "AIzaSyBjyOOL1Y9qGzql_FWvYfjxGx1FukoUH0I",
  authDomain: "kvs-memories.firebaseapp.com",
  databaseURL: "https://kvs-memories-default-rtdb.asia-southeast1.firebasedatabase.app",
  projectId: "kvs-memories",
  storageBucket: "kvs-memories.firebasestorage.app",
  messagingSenderId: "62349854159",
  appId: "1:62349854159:web:0d26b214c54dcf00c5beba",
  measurementId: "G-WB76L4JGET"
};

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app); // This is Realtime Database
    window.db = db;
    window.ref = ref;
    window.push = push;
    window.query = query;
    window.orderByChild = orderByChild;
    window.onValue = onValue;
    window.serverTimestamp = serverTimestamp;
  </script>
  <!-- Font Awesome -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Inter', 'Segoe UI', system-ui, sans-serif;
    }

    body {
      background: linear-gradient(145deg, #0b0907 0%, #1f1610 100%);
      min-height: 100vh;
      padding: 1rem 1rem 2.5rem;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    .wrapper {
      max-width: 1400px;
      width: 100%;
    }

    /* ---------- cosmic header ---------- */
    .header {
      text-align: center;
      margin: 2rem 0 2rem;
      position: relative;
    }

    .header h1 {
      font-size: clamp(2.8rem, 12vw, 5rem);
      font-weight: 800;
      background: linear-gradient(145deg, #ffdab0, #f5b086, #d6ad8a, #b2cfdf);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
      text-shadow: 0 0 20px #ff8c5a80, 0 0 60px #aa5e33;
      filter: drop-shadow(0 10px 6px #00000060);
      letter-spacing: -0.02em;
      line-height: 1.1;
    }

    .header h1 span {
      font-size: 0.5em;
      display: block;
      font-weight: 300;
      letter-spacing: 0.3em;
      color: #fbddc0;
      text-shadow: 0 0 8px cyan;
    }

    /* popup overlay */
    .popup-overlay {
      position: fixed;
      top: 0; left: 0; width: 100%; height: 100%;
      background: rgba(0,0,0,0.85);
      backdrop-filter: blur(12px);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 1000;
      transition: opacity 0.3s ease;
    }

    .popup-card {
      background: #20160e;
      border: 2px solid #d8935f;
      border-radius: 4rem 2rem 4rem 2rem;
      padding: 2.5rem 2rem;
      max-width: 550px;
      width: 90%;
      box-shadow: 0 30px 60px #000000, 0 0 80px #ff974f;
      text-align: center;
    }

    .popup-card i {
      font-size: 3.5rem;
      color: #f5b185;
      margin-bottom: 1rem;
    }

    .popup-message {
      font-size: 1.8rem;
      line-height: 1.4;
      color: #ffdec6;
      font-weight: 500;
      margin: 1.2rem 0;
    }

    .close-popup-btn {
      background: linear-gradient(145deg, #d17e44, #ac6637);
      border: none;
      color: #120b06;
      font-weight: 800;
      font-size: 1.4rem;
      padding: 1rem 2.8rem;
      border-radius: 60px;
      margin-top: 1.8rem;
      box-shadow: 0 8px 0 #543c29, 0 15px 30px black;
      cursor: pointer;
      transition: 0.06s linear;
      border: 1px solid #ffbc86;
      display: inline-flex;
      align-items: center;
      gap: 1rem;
    }

    .close-popup-btn:active {
      transform: translateY(6px);
      box-shadow: 0 2px 0 #543c29, 0 15px 30px black;
    }

    /* name input area (outside popup now) */
    .name-prompt-section {
      background: rgba(25, 15, 9, 0.7);
      backdrop-filter: blur(18px);
      border: 1px solid #ddb08660;
      border-radius: 100px 20px 100px 20px;
      padding: 1.8rem 2rem;
      max-width: 700px;
      margin: 1.8rem auto 2.5rem;
      box-shadow: 0 20px 40px #00000070, 0 0 40px #f5ac7860;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    .prompt-label {
      color: #fad7b3;
      font-size: 1.7rem;
      margin-bottom: 1rem;
      display: flex;
      gap: 0.6rem;
    }

    .name-input-group {
      display: flex;
      gap: 0.8rem;
      flex-wrap: wrap;
      justify-content: center;
      width: 100%;
    }

    #userNameInput {
      background: #1c130eb0;
      border: 2px solid #b4794e;
      border-radius: 60px;
      padding: 1rem 1.8rem;
      font-size: 1.3rem;
      color: #ffebdb;
      width: 280px;
      outline: none;
    }

    .primary-btn {
      background: linear-gradient(145deg, #b5622e, #a05630);
      border: none;
      color: #130b06;
      font-weight: 700;
      padding: 1rem 2.2rem;
      border-radius: 60px;
      font-size: 1.3rem;
      cursor: pointer;
      box-shadow: 0 8px 0 #492e1b, 0 10px 20px #000;
      transition: 0.06s linear;
      display: inline-flex;
      align-items: center;
      gap: 0.8rem;
      border: 1px solid #fec196;
    }

    .primary-btn:active {
      transform: translateY(6px);
      box-shadow: 0 2px 0 #492e1b, 0 10px 20px #000;
    }

    .small-note {
      color: #cfa882;
      font-size: 1rem;
      margin-top: 1.3rem;
    }

    /* search */
    .search-section {
      display: flex;
      justify-content: center;
      margin: 1rem 0 2rem;
    }

    .search-wrapper {
      background: rgba(20, 12, 7, 0.8);
      backdrop-filter: blur(16px);
      border: 1px solid #cf9d73;
      border-radius: 80px;
      padding: 0.3rem 0.3rem 0.3rem 1.8rem;
      display: inline-flex;
      align-items: center;
      gap: 0.4rem;
      width: 100%;
      max-width: 500px;
      box-shadow: 0 0 30px #a8541f60;
    }

    .search-wrapper i {
      color: #f3b185;
      font-size: 1.3rem;
    }

    #searchInput {
      background: transparent;
      border: none;
      padding: 1rem 0.5rem;
      font-size: 1.2rem;
      color: #fbe5d2;
      flex: 1;
      min-width: 160px;
      outline: none;
    }

    #searchInput::placeholder {
      color: #b28d70;
      font-style: italic;
    }

    .search-clear {
      background: #533a28;
      border-radius: 50%;
      width: 38px;
      height: 38px;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #efd7c0;
      cursor: pointer;
      margin-right: 6px;
    }

    /* friends grid */
    .friends-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
      gap: 2rem 1.5rem;
      margin: 2rem 0 3rem;
    }

    .person-card {
      background: rgba(22, 14, 9, 0.7);
      backdrop-filter: blur(20px);
      border-radius: 3rem 1.5rem 3rem 1.5rem;
      border: 1px solid rgba(230, 150, 90, 0.35);
      box-shadow: 0 30px 40px -20px #000, 0 0 0 1px #c7875760 inset, 0 0 50px #ff944020;
      transition: 0.25s ease;
      display: flex;
      flex-direction: column;
    }

    .person-card:hover {
      transform: scale(1.02) translateY(-8px);
      border-color: #febe8b;
      box-shadow: 0 40px 50px -12px black, 0 0 50px #ff9b4d;
    }

    .name-badge {
      padding: 1.5rem 1.5rem 0.8rem;
      border-bottom: 2px solid #eaa369;
      background: linear-gradient(120deg, #2d1d13, #1f130c);
    }

    .name-badge h2 {
      font-size: 2.2rem;
      font-weight: 700;
      color: #ffebdb;
      text-shadow: 0 3px 8px #4f2d17;
      word-break: break-word;
    }

    .card-split {
      display: flex;
      flex-direction: row;
      flex-wrap: wrap;
      padding: 1.2rem 1rem 1.5rem;
      gap: 1.2rem;
      background: rgba(5, 3, 2, 0.3);
    }

    .left-write {
      flex: 1 1 200px;
    }

    .right-anon {
      flex: 2 1 260px;
    }

    .section-label {
      font-size: 0.8rem;
      text-transform: uppercase;
      letter-spacing: 2.5px;
      font-weight: 600;
      color: #edc5a6;
      margin-bottom: 0.8rem;
      display: flex;
      align-items: center;
      gap: 0.6rem;
    }

    .write-box {
      display: flex;
      flex-direction: column;
      gap: 1rem;
    }

    .write-box textarea {
      background: #1a120bb0;
      border: 2px solid #b67f5b;
      border-radius: 28px;
      padding: 1rem 1.3rem;
      font-size: 1rem;
      color: #ffefdf;
      resize: vertical;
      min-height: 120px;
      backdrop-filter: blur(4px);
      transition: 0.2s;
      box-shadow: inset 0 0 20px #000000b0;
    }

    .write-box textarea:focus {
      border-color: #febe8b;
      outline: none;
      background: #221711b0;
      box-shadow: 0 0 20px #fea55e, inset 0 0 10px #000;
    }

    .write-box button {
      background: linear-gradient(125deg, #c36f3a, #af6f48);
      border: none;
      color: #0f0804;
      font-weight: 800;
      padding: 1rem 0.8rem;
      border-radius: 50px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.8rem;
      box-shadow: 0 7px 0 #593c27, 0 10px 30px black;
      transition: 0.06s linear;
      border: 1px solid #ffbd87;
      font-size: 1.05rem;
    }

    .write-box button:active {
      transform: translateY(5px);
      box-shadow: 0 2px 0 #593c27, 0 10px 30px black;
    }

    .messages-wall {
      background: rgba(0, 0, 0, 0.6);
      backdrop-filter: blur(12px);
      border-radius: 30px;
      padding: 1.2rem 1rem 0.5rem;
      max-height: 260px;
      overflow-y: auto;
      border: 1px solid #b68560;
      box-shadow: inset 0 0 25px #000000cc, 0 8px 16px #000;
    }

    .message-item {
      background: #2c1b11e0;
      border-radius: 30px 30px 30px 12px;
      padding: 1rem 1.3rem;
      margin-bottom: 0.9rem;
      color: #f7ddc9;
      font-size: 1rem;
      border-left: 6px solid #da8f59;
      box-shadow: 0 6px 14px #000000b0;
      word-break: break-word;
      border: 1px solid #e6a16e70;
    }

    .message-item::after {
      content: "⚡ anonymous · naam nahi";
      font-size: 0.68rem;
      color: #c8aa90;
      display: block;
      text-align: right;
      margin-top: 0.5rem;
      border-top: 1px dashed #a97958;
      padding-top: 0.4rem;
    }

    .empty-note {
      color: #bda089;
      font-style: italic;
      padding: 1.5rem 0.3rem;
      text-align: center;
      background: #1f130b40;
      border-radius: 40px;
    }

    .footer-note {
      background: #1e130cb0;
      backdrop-filter: blur(14px);
      padding: 1.2rem 2rem;
      border-radius: 90px;
      border: 1px solid #d6996a;
      width: fit-content;
      margin: 2rem auto 0;
      color: #ffdfc2;
      font-size: 1.3rem;
      box-shadow: 0 0 40px #ffad70;
    }

    .hidden {
      display: none !important;
    }
  </style>
</head>
<body>
  <!-- POPUP (hidden initially) -->
  <div id="greetingPopup" class="popup-overlay hidden">
    <div class="popup-card">
      <i class="fa-regular fa-face-smile"></i>
      <div id="popupMessage" class="popup-message"></div>
      <button class="close-popup-btn" id="closePopupBtn"><i class="fa-regular fa-xmark"></i> close · continue</button>
    </div>
  </div>

  <div class="wrapper">
    <div class="header">
      <h1>kuch shabd <span>dosti ke naam</span></h1>
    </div>

    <!-- Name input area (always visible, but popup appears on submit) -->
    <div class="name-prompt-section">
      <div class="prompt-label"><i class="fa-regular fa-hand-peace"></i> तू कौन है यार?</div>
      <div class="name-input-group">
        <input type="text" id="userNameInput" placeholder="your first name..." value="">
        <button class="primary-btn" id="showPopupBtn"><i class="fa-regular fa-star"></i> enter</button>
      </div>
      <div class="small-note"><i class="fa-regular fa-face-smile"></i> we’ll greet you with a memory — your name never stored</div>
    </div>

    <!-- Search bar -->
    <div class="search-section">
      <div class="search-wrapper">
        <i class="fa-regular fa-magnifying-glass"></i>
        <input type="text" id="searchInput" placeholder="search a friend... shaurya, ayushi, anand ...">
        <span class="search-clear" id="clearSearch"><i class="fa-regular fa-xmark"></i></span>
      </div>
    </div>

    <!-- dynamic grid -->
    <div id="friendsGrid" class="friends-grid"></div>

    <div class="footer-note">
      <i class="fa-regular fa-lock"></i>  no names revealed · only love  <i class="fa-regular fa-heart"></i>
    </div>
  </div>

<script type="module">
  // ---------- NAMES (sorted alphabetical, unique, 27) ----------
  const rawNames = [
    "Anand", "Anmol", "Ashish", "Astha", "Ayushi", "Ayushkant", "Ayush P.",
    "Diksha", "Ekansh", "Hanshika", "Hema", "Ishu", "Jyotiraditya", "Kavita",
    "Kirti", "Lakshya", "Manish", "Md Anis", "Priyanshi", "Samarth", "Samridhi",
    "Shaurya", "Shivraj", "Shubham", "Yuvraj", "Yuvraj S."
  ];
  const uniqueNames = [...new Set(rawNames)].sort((a,b) => a.localeCompare(b));

  // ---------- 30+ memories ----------
  const memoryBank = [
    "Do you remember that lunch break when we shared parathas under the banyan tree?",
    "That rainy day we got drenched during PT and laughed like crazy.",
    "The last bell on farewell – we all cried and hugged.",
    "Remember the inter-school quiz where we won by one point?",
    "Those endless chai sessions at the canteen with samosa.",
    "The way you copied my maths homework and teacher still praised you.",
    "That annual day rehearsal when you forgot your dialogue and we improvised.",
    "The bench at the back row – our kingdom.",
    "When we bunked class to watch a movie and got caught.",
    "The class picnic where we played antakshari for three hours.",
    "You always had an extra pen – my saviour.",
    "The fight we had and then made up during recess.",
    "When we stayed back after school for football and the gate was locked.",
    "That teacher’s facial expression when we pranked her.",
    "The way you used to save me a seat near the window.",
    "Remember the midnight phone calls before exams?",
    "We made a time capsule and buried it near the playground.",
    "The last day – we wrote on each other's shirts.",
    "You taught me to ride a bicycle in the school parking lot.",
    "That diwali celebration in class – so much mithai.",
    "The time we both fell asleep in library and got yelled at.",
    "You always shared your tiffin when I forgot mine.",
    "The gossip sessions during chemistry lab.",
    "We made a secret handshake that no one else knew.",
    "That scary story you told during the camp fire.",
    "Our group study that usually ended with jokes and pizza.",
    "The way we doodled on the last pages of our notebooks.",
    "We promised to be in touch forever – and here we are.",
    "You were the only one who understood my stupid jokes.",
    "The farewell gift you gave me – I still keep it.",
    "Walking together to the bus stop every single day.",
    "That time we both got detention and painted the class boards."
  ];

  // ---------- Realtime Database imports ----------
  import { getDatabase, ref, push, query, orderByChild, onValue, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";
  const db = window.db;
  
  // Create a reference to the messages node
  const messagesRef = ref(db, 'messages');

  // ---------- popup elements ----------
  const popup = document.getElementById('greetingPopup');
  const popupMessageDiv = document.getElementById('popupMessage');
  const closePopupBtn = document.getElementById('closePopupBtn');
  const showPopupBtn = document.getElementById('showPopupBtn');
  const userNameInput = document.getElementById('userNameInput');

  // close popup -> hides it, main web already visible
  closePopupBtn.addEventListener('click', () => {
    popup.classList.add('hidden');
  });

  // show popup with random memory based on name
  function triggerPopup(name) {
    const randomIdx = Math.floor(Math.random() * memoryBank.length);
    const memory = memoryBank[randomIdx];
    const displayName = name.trim() || 'friend';
    popupMessageDiv.innerText = `${displayName}, ${memory}`;
    popup.classList.remove('hidden');
  }

  showPopupBtn.addEventListener('click', () => {
    const name = userNameInput.value.trim();
    triggerPopup(name);
  });

  // optional: if user hits enter in input
  userNameInput.addEventListener('keypress', (e) => {
    if (e.key === 'Enter') {
      e.preventDefault();
      showPopupBtn.click();
    }
  });

  // ---------- BUILD GRID with Realtime Database ----------
  function buildGrid(filterText = '') {
    const grid = document.getElementById('friendsGrid');
    grid.innerHTML = '';
    const lowerFilter = filterText.toLowerCase().trim();
    const filtered = uniqueNames.filter(name => name.toLowerCase().includes(lowerFilter));

    if (filtered.length === 0) {
      grid.innerHTML = '<div style="grid-column:1/-1; text-align:center; color:#cfa58b; padding:4rem;">🤔 no such friend found, but they exist in heart ✨</div>';
      return;
    }

    filtered.forEach(friend => {
      const safeId = friend.replace(/\s|\./g, '');
      const card = document.createElement('div');
      card.className = 'person-card';
      card.id = `card-${safeId}`;

      const badge = document.createElement('div');
      badge.className = 'name-badge';
      badge.innerHTML = `<h2>${friend}</h2>`;
      card.appendChild(badge);

      const splitDiv = document.createElement('div');
      splitDiv.className = 'card-split';

      const leftCol = document.createElement('div');
      leftCol.className = 'left-write';
      leftCol.innerHTML = `
        <div class="section-label"><i class="fa-regular fa-pencil"></i> write anonymously</div>
        <div class="write-box">
          <textarea id="input-${safeId}" placeholder="something about ${friend}... (no name)"></textarea>
          <button class="post-btn" data-friend="${friend}" id="btn-${safeId}"><i class="fa-regular fa-paper-plane"></i> send · anonymous</button>
        </div>
      `;

      const rightCol = document.createElement('div');
      rightCol.className = 'right-anon';
      rightCol.innerHTML = `
        <div class="section-label"><i class="fa-regular fa-message"></i> anonymous wall</div>
        <div id="wall-${safeId}" class="messages-wall"><div class="empty-note">✨ loading whispers...<div></div></div></div>
      `;

      splitDiv.appendChild(leftCol);
      splitDiv.appendChild(rightCol);
      card.appendChild(splitDiv);
      grid.appendChild(card);

      // Realtime Database listener for this friend
      // Create a query to get messages for this friend ordered by timestamp
      const friendMessagesQuery = query(
        ref(db, 'messages'),
        orderByChild('friendName')
      );
      
      const wallDiv = document.getElementById(`wall-${safeId}`);

      // Listen for changes
      onValue(friendMessagesQuery, (snapshot) => {
        if (!wallDiv) return;
        
        const messages = [];
        snapshot.forEach((childSnapshot) => {
          const data = childSnapshot.val();
          if (data.friendName === friend) {
            messages.push({
              text: data.text,
              timestamp: data.timestamp || 0
            });
          }
        });

        // Sort by timestamp (newest first) - Realtime DB doesn't support multiple orderBy
        messages.sort((a, b) => (b.timestamp || 0) - (a.timestamp || 0));

        if (messages.length === 0) {
          wallDiv.innerHTML = `<div class="empty-note">💬 no whispers yet. be the first.</div>`;
          return;
        }

        let html = '';
        messages.slice(0, 15).forEach(msg => {
          html += `<div class="message-item">${msg.text}</div>`;
        });
        wallDiv.innerHTML = html;
      });

      const btn = document.getElementById(`btn-${safeId}`);
      const textarea = document.getElementById(`input-${safeId}`);

      btn.addEventListener('click', async () => {
        const msg = textarea.value.trim();
        if (!msg) { alert('kuch likho yaar ❤️'); return; }
        const trimmed = msg.length > 500 ? msg.substring(0,500)+'…' : msg;
        
        try {
          // Push to Realtime Database
          await push(ref(db, 'messages'), {
            friendName: friend,
            text: trimmed,
            timestamp: Date.now() // Using client timestamp for Realtime DB
          });
          textarea.value = '';
        } catch (e) {
          alert('✨ Realtime Database magic delayed, but it will appear!');
          console.error(e);
        }
      });

      textarea.addEventListener('keydown', (e) => {
        if ((e.ctrlKey || e.metaKey) && e.key === 'Enter') {
          e.preventDefault();
          btn.click();
        }
      });
    });
  }

  // initial render (all names)
  buildGrid('');

  // Search
  document.getElementById('searchInput').addEventListener('input', (e) => {
    buildGrid(e.target.value);
  });
  document.getElementById('clearSearch').addEventListener('click', () => {
    document.getElementById('searchInput').value = '';
    buildGrid('');
  });
</script>
</body>
</html>
